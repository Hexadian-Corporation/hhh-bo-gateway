version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    reviewers:
      - nahumcueto
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    reviewers:
      - nahumcueto
    open-pull-requests-limit: 5
    # Bundle all github-actions bumps (incl. reusable workflows) into one weekly PR.
    groups:
      github-actions:
        patterns:
          - "*"
